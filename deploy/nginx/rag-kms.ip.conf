# RAG KMS — single public IP, HTTP only (no domain yet)
#
# Frontend: http://YOUR_IP/
# API:      http://YOUR_IP/api/  → backend :8000
#
# Install:
#   sudo cp deploy/nginx/rag-kms.ip.conf /etc/nginx/sites-available/rag-kms.conf
#   sudo ln -sf /etc/nginx/sites-available/rag-kms.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Project .env (no trailing slash), then rebuild frontend:
#   NEXT_PUBLIC_API_URL=http://YOUR_IP/api
#   docker compose up -d --build frontend
#
# Azure: open inbound TCP 80 (and 443 later). You do not need to expose :8000 publicly.

upstream rag_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream rag_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://rag_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location / {
        proxy_pass http://rag_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
