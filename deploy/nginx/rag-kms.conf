# RAG KMS — Nginx reverse proxy
#
# Replace example.com with your domain before use:
#   APP_DOMAIN  → frontend (Next.js on :3000)
#   API_DOMAIN  → backend  (FastAPI on :8000)
#
# Install:
#   sudo cp deploy/nginx/rag-kms.conf /etc/nginx/sites-available/rag-kms.conf
#   sudo ln -sf /etc/nginx/sites-available/rag-kms.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Set in project .env (then rebuild frontend):
#   NEXT_PUBLIC_API_URL=https://api.example.com
#
# TLS (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d app.example.com -d api.example.com
#
# Cert paths below assume both names are on one certificate (first -d name).

upstream rag_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream rag_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# --- HTTP: ACME challenges + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com api.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Frontend (Next.js) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://rag_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# --- Backend API (FastAPI) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # PDF / document uploads
    client_max_body_size 100M;

    location / {
        proxy_pass http://rag_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ollama + ingestion can be slow on a small VPS
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
