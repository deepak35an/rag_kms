# RAG KMS — HTTP-only (use before SSL is ready)
#
# Use this for first boot or IP-only testing. Swap to rag-kms.conf after certbot.
#
# Install:
#   sudo cp deploy/nginx/rag-kms.http-only.conf /etc/nginx/sites-available/rag-kms.conf
#   sudo ln -sf /etc/nginx/sites-available/rag-kms.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# .env for HTTP testing:
#   NEXT_PUBLIC_API_URL=http://api.example.com

upstream rag_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream rag_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    location / {
        proxy_pass http://rag_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://rag_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
